<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Saúde Tupi
</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #eef2f7;
  padding: 20px;
}

.sidebar h2 {
  color: #2b6cb0;
  margin-bottom: 20px;
}

.menu a {
  display: block;
  padding: 12px;
  margin-bottom: 10px;
  background: #dbe2ea;
  border-radius: 10px;
  text-decoration: none;
  color: black;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.topbar {
  background: white;
  padding: 10px 20px;
  border-bottom: 1px solid #ddd;
}

.topbar .row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar h1 {
  color: #2b6cb0;
}

.search {
  padding: 8px;
  width: 250px;
}

.nav-links {
  display: flex;
  gap: 20px;
  margin-top: 5px;
}

.nav-links a {
  text-decoration: none;
  color: #2b6cb0;
  font-weight: bold;
}

/* MAPA */
#map {
  flex: 1;
  z-index: 1;
}

/* CARD DESLIZANTE */
.card {
  position: fixed;
  left: 260px;
  right: 0;
  bottom: 0;

  height: 60px;
  background: white;

  border-radius: 15px 15px 0 0;
  box-shadow: 0px -4px 12px rgba(0,0,0,0.2);

  z-index: 9999;
  overflow: hidden;

  transition: height 0.25s ease;
}

/* BARRA */
.handle {
  width: 50px;
  height: 6px;
  background: #bbb;
  border-radius: 10px;
  margin: 10px auto;
  cursor: grab;
}

/* CONTEÚDO */
.card-content {
  padding: 15px;
  opacity: 0;
  transition: opacity 0.2s;
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px;
  background: #3182ce;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>+ Saúde Piracicaba</h2>

  <div class="menu">
    <a href="#">Buscar Unidades</a>
    <a href="#">Agendamento</a>
    <a href="#">Medicamentos</a>
    <a href="#">Emergência</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="topbar">
    <div class="row">
      <h1>Saúde Piracicaba</h1>
      <input class="search" placeholder="Pesquise unidades...">
      <div>👤</div>
    </div>

    <div class="nav-links">
      <a href="#">Buscar</a>
      <a href="#">Agendamento</a>
      <a href="#">Medicamentos</a>
      <a href="#">Emergência</a>
      <a href="#">Dicas</a>
    </div>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

  <!-- CARD -->
  <div class="card" id="infoCard">
    <div class="handle" id="handle"></div>
    <div class="card-content" id="cardContent">
      Arraste para cima
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAPA
var map = L.map('map').setView([-22.733, -47.649], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DADOS
var unidades = [
  {
    id: 1,
    nome: "UPA Vila Cristina",
    endereco: "Rua Dona Idalina, 51",
    horario: "24h",
    telefone: "(19) 0000-0000",
    lat: -22.73,
    lng: -47.65
  },
  {
    id: 2,
    nome: "UBS Cidade Alta",
    endereco: "Rua Benedito Passuti, 301",
    horario: "08h - 17h",
    telefone: "(19) 1111-1111",
    lat: -22.72,
    lng: -47.64
  }
];

// CARD CONTROLE
const card = document.getElementById("infoCard");
const content = document.getElementById("cardContent");
const handle = document.getElementById("handle");

let startY = 0;
let startHeight = 60;

const MIN = 60;
const MID = 220;
const MAX = 420;

// DRAG
handle.addEventListener("mousedown", (e) => {
  startY = e.clientY;
  startHeight = card.offsetHeight;

  document.onmousemove = (e) => {
    let newHeight = startHeight + (startY - e.clientY);

    if (newHeight < MIN) newHeight = MIN;
    if (newHeight > MAX) newHeight = MAX;

    card.style.height = newHeight + "px";

    content.style.opacity = newHeight > 120 ? 1 : 0;
  };

  document.onmouseup = () => {
    document.onmousemove = null;

    let h = card.offsetHeight;

    if (h < 150) card.style.height = MIN + "px";
    else if (h < 320) card.style.height = MID + "px";
    else card.style.height = MAX + "px";
  };
});

// MARCADORES
unidades.forEach(u => {
  var marker = L.marker([u.lat, u.lng]).addTo(map);

  marker.on('click', () => {
    card.style.height = MID + "px";
    content.style.opacity = 1;

    content.innerHTML = `
      <h3>${u.nome}</h3>
      <p><strong>Endereço:</strong> ${u.endereco}</p>
      <p><strong>Horário:</strong> ${u.horario}</p>
      <p><strong>Telefone:</strong> ${u.telefone}</p>
      <a href="#" class="btn">Ver detalhes</a>
    `;
  });
});
</script>

</body>
</html>
